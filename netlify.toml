[build]
  publish = "public"
  command = "npm ci && hugo --gc --minify && npx pagefind --site public"

[build.environment]
  HUGO_VERSION = "0.163.0"
  HUGO_ENVIRONMENT = "production"
  NODE_VERSION = "22"

[context.deploy-preview]
  command = "npm ci && hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL && npx pagefind --site public"

# "preview" makes hugo.IsProduction false, so seo.html emits noindex,nofollow
# on preview/branch URLs. We avoid "development" so hugo.IsDevelopment stays
# false and the CSS pipeline keeps minifying/fingerprinting like production.
[context.deploy-preview.environment]
  HUGO_VERSION = "0.163.0"
  HUGO_ENVIRONMENT = "preview"

[context.branch-deploy]
  command = "npm ci && hugo --gc --minify -b $DEPLOY_PRIME_URL && npx pagefind --site public"

[context.branch-deploy.environment]
  HUGO_VERSION = "0.163.0"
  HUGO_ENVIRONMENT = "preview"

# Redirects for SEO continuity.
#
# page/1 pagination → list root (26 live URLs: /blog/page/1 + 25 tag page/1s).
# Hugo auto-emits a meta-refresh alias stub for each of these; these forced
# server-side 301s replace that client-side refresh with a clean redirect.
# `force = true` is required so the rule wins over the existing page/1/index.html
# alias file (a non-forced rule is shadowed by it and never fires), and the
# trailing-slash form matches Netlify's normalized request path. The :tag
# placeholder collapses all 25 tag URLs into one rule.
# See docs/url-parity/report.md "The redirect set #172 must implement".
[[redirects]]
  from = "/blog/page/1/"
  to = "/blog/"
  status = 301
  force = true

[[redirects]]
  from = "/tags/:tag/page/1/"
  to = "/tags/:tag/"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
