# Markup configuration
[markup.goldmark.renderer]
  unsafe = true

# Related content
[related]
  includeNewer = true
  threshold = 80
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10
