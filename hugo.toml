baseURL = "https://ofreport.com/"
locale = "en-US"
title = "OFReport.com"
copyright = "© 2026 Joshua and Kelsie Steele"
enableRobotsTXT = true

# Pagination
[pagination]
  pagerSize = 8

# Permalinks — preserve existing URL structure (SEO-critical)
[permalinks]
  blog = "/blog/:slug/"

# Taxonomies
[taxonomies]
  tag = "tags"

# RSS output
[services.rss]
  limit = 10

[outputFormats.RSS]
  baseName = "feed"

# Site parameters
[params]
  description = "Joshua and Kelsie Steele — Missionaries serving Christ in Ukraine"
  titleSuffix = "Joshua and Kelsie Steele — Missionaries serving Christ in Ukraine"
  cloudinaryBase = "https://res.cloudinary.com/dnkvsijzu"
  pdfBase = "https://d21yo20tm8bmc2.cloudfront.net/ofr/"
  # Default social/OG image (front-page hero) for pages without a cover.
  # Stored untransformed; the cloudinary-url "og" preset is applied at render.
  ogImage = "https://res.cloudinary.com/dnkvsijzu/image/upload/v1574408895/OFReport/assets/ofr-home-page-12-6_dk4tai.jpg"

  # Umami analytics. Left empty until the Phase 16 production cutover; the
  # analytics.html partial emits nothing while these are blank, so it stays
  # inert on every build. At go-live, reuse the EXISTING OFReport.com website
  # so Umami keeps appending to the same dashboard record (no new entry):
  #   scriptUrl = "https://lens.euroteamoutreach.org/script.js"
  #   websiteId = "34d2cfa4-e623-418a-936d-670c9d163ead"
  [params.umami]
    scriptUrl = ""
    websiteId = ""

# Build stats for Tailwind CSS purging
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

# Module mounts for Tailwind CSS integration
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

